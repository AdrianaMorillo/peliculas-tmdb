<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo TMDB</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div class="container py-4">

    <h1 class="text-center text-light mb-4">🎬 Catálogo de Películas</h1>

    <!-- BUSCADOR -->
    <div class="position-relative mb-3">
      <input id="searchInput" class="form-control" placeholder="Buscar película...">
      <div id="suggestions" class="list-group position-absolute w-100"></div>
    </div>

    <!-- GRID -->
    <div id="movies" class="row g-3"></div>

    <!-- PAGINACIÓN -->
    <div class="d-flex justify-content-center mt-4">
      <button id="prevBtn" class="btn btn-secondary me-2">Anterior</button>
      <span id="pageInfo" class="text-light align-self-center"></span>
      <button id="nextBtn" class="btn btn-secondary ms-2">Siguiente</button>
    </div>

  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
